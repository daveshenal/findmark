<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="header">
    <div class="logo">🔖</div>
    <span class="title">Bookmark Search</span>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">starting</span>
    </div>
  </div>

  <div class="progress-bar-wrap" id="progressWrap">
    <div class="progress-track">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-label">
      <span class="progress-hint">downloading model weights…</span>
      <span id="progressPct"></span>
    </div>
  </div>

  <div class="search-area">
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="describe what you're looking for…" autocomplete="off"
        spellcheck="false" disabled />
      <button class="clear-btn" id="clearBtn">✕</button>
    </div>
  </div>

  <div class="results-area" id="resultsArea">
    <div class="state-message" id="stateMessage">
      <span class="emoji">⚡</span>
      <strong>Loading AI model…</strong>
      <span>This only happens once. Future searches are instant.</span>
    </div>
  </div>

  <div class="footer">
    <span class="footer-info" id="footerInfo">—</span>
    <div class="footer-actions">
      <button class="footer-btn" id="debugToggle">▼ debug</button>
      <button class="footer-btn" id="reindexBtn">re-index</button>
    </div>
  </div>

  <div id="debugPanel">
    <div class="debug-header">
      <span class="debug-title">⚙ debug log</span>
      <div class="debug-actions">
        <button class="debug-action-btn" id="debugCopy">copy</button>
        <button class="debug-action-btn" id="debugClear">clear</button>
      </div>
    </div>
    <div id="debugLog"></div>
  </div>

  <script src="popup.js" type="module"></script>
</body>

</html>
