<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bookmark Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0f;
      --surface: #141418;
      --surface2: #1c1c22;
      --border: #2a2a35;
      --accent: #7b6ef6;
      --accent2: #a78bfa;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --green: #4ade80;
      --red: #f87171;
    }

    body {
      width: 420px;
      min-height: 200px;
      max-height: 580px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    .header {
      padding: 18px 18px 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .status-pill {
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .status-dot.ready { background: var(--green); }
    .status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
    .status-dot.error { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .search-area {
      padding: 14px 18px 12px;
    }

    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      color: var(--muted);
      font-size: 16px;
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 44px 11px 38px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #searchInput::placeholder { color: var(--muted); }
    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(123, 110, 246, 0.12);
    }

    .clear-btn {
      position: absolute;
      right: 10px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: none;
      font-size: 14px;
      line-height: 1;
      transition: color 0.15s;
    }

    .clear-btn:hover { color: var(--text); }
    .clear-btn.visible { display: flex; align-items: center; }

    .results-area {
      overflow-y: auto;
      max-height: 420px;
      padding: 0 10px 10px;
    }

    .results-area::-webkit-scrollbar { width: 4px; }
    .results-area::-webkit-scrollbar-track { background: transparent; }
    .results-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .state-message {
      padding: 24px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .state-message .emoji { font-size: 28px; display: block; margin-bottom: 8px; }
    .state-message strong { color: var(--text); display: block; margin-bottom: 4px; font-weight: 500; }

    .progress-bar-wrap {
      margin: 12px 18px 0;
      background: var(--surface);
      border-radius: 4px;
      height: 3px;
      overflow: hidden;
      display: none;
    }

    .progress-bar-wrap.visible { display: block; }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      width: 0%;
      transition: width 0.4s ease;
    }

    .results-header {
      padding: 6px 8px 8px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .result-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 10px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
      margin-bottom: 2px;
    }

    .result-item:hover { background: var(--surface2); }

    .result-favicon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 2px;
      object-fit: contain;
      background: var(--surface2);
    }

    .result-favicon-fallback {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 2px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: var(--muted);
    }

    .result-body { flex: 1; min-width: 0; }

    .result-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .result-url {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-score {
      flex-shrink: 0;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      margin-top: 3px;
      opacity: 0.7;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 8px 8px;
      opacity: 0.5;
    }

    .footer {
      padding: 8px 18px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
    }

    .footer-info {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .reindex-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .reindex-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">🔖</div>
    <span class="title">Bookmark Search</span>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">starting</span>
    </div>
  </div>

  <div class="progress-bar-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="search-area">
    <div class="search-box">
      <span class="search-icon">⌕</span>
      <input
        type="text"
        id="searchInput"
        placeholder="describe what you're looking for…"
        autocomplete="off"
        spellcheck="false"
        disabled
      />
      <button class="clear-btn" id="clearBtn">✕</button>
    </div>
  </div>

  <div class="results-area" id="resultsArea">
    <div class="state-message" id="stateMessage">
      <span class="emoji">⚡</span>
      <strong>Loading AI model…</strong>
      This only happens once. Future searches are instant.
    </div>
  </div>

  <div class="footer">
    <span class="footer-info" id="footerInfo">—</span>
    <button class="reindex-btn" id="reindexBtn">re-index</button>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
